name: "Validate and Publish Extension"

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    # Trigger based on the title prefix defined in the issue template
    if: startsWith(github.event.issue.title, '[Extension]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Audit Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
          REPOSITORY: ${{ github.repository }}
        run: node scripts/audit.js

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions.json assets/ extensions/
          git commit -m "Auto-publish extension from Issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push
