name: "Upload / Update Extension"
description: "Submit or update your extension for the GNOME Beta Store"
title: "[Extension] "
labels: ["nueva-extension"]
body:
  - type: markdown
    attributes:
      value: "Please fill out all fields to submit or update your extension. For files (ZIP, Icon, Screenshots), simply drag and drop them into the corresponding text box for GitHub to upload them."
  - type: input
    id: uuid
    attributes:
      label: "Extension UUID"
      description: "e.g., my-extension@author.com"
      placeholder: "my-extension@author.com"
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: "Clear Name"
      description: "The public or commercial name of the extension"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A brief summary of what the extension does"
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: "GitHub Link"
      description: "URL of the extension's code repository"
    validations:
      required: true
  - type: input
    id: promo_url
    attributes:
      label: "Promotional Link or Website (Optional)"
      description: "URL for marketing, donations, or your own documentation"
    validations:
      required: false
  - type: textarea
    id: zip_file
    attributes:
      label: "ZIP File"
      description: "Drag the .zip file of your extension here"
    validations:
      required: true
  - type: textarea
    id: icon_file
    attributes:
      label: "Icon (icon.png)"
      description: "Drag your extension's icon here (square image)"
    validations:
      required: true
  - type: textarea
    id: demo_files
    attributes:
      label: "Demos / Screenshots"
      description: "Drag one or more screenshots of your extension here"
    validations:
      required: true
